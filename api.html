<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🍀 Growing Together — 陪伴日记</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #fefaf5;
            --card-bg: rgba(255, 255, 255, 0.85);
            --sage: #b5c9b0;
            --sage-deep: #7d9b76;
            --text: #5c4a3a;
            --text-light: #8b7b6b;
            --radius-lg: 28px;
            --font-main: Georgia, 'Times New Roman', 'Apple SD Gothic Neo', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); font-family:var(--font-main); color:var(--text); display:flex; justify-content:center; align-items:center; min-height:100vh; padding:2rem 1rem; }
        .container { width:100%; max-width:480px; }
        .card { background:var(--card-bg); backdrop-filter:blur(16px); border-radius:var(--radius-lg); padding:2rem; box-shadow:0 4px 24px rgba(120,100,80,0.08); margin-bottom:1.5rem; }
        h1 { color:var(--sage-deep); font-size:1.8rem; margin-bottom:1rem; text-align:center; }
        input { width:100%; padding:0.8rem; border-radius:16px; border:1px solid #ddd; margin-bottom:0.8rem; font-size:1rem; }
        button { width:100%; padding:0.9rem; background:var(--sage-deep); color:#fff; border:none; border-radius:50px; font-size:1rem; cursor:pointer; margin-top:0.5rem; }
        .alt-btn { background:transparent; color:var(--sage-deep); border:1px solid var(--sage-deep); margin-top:0.3rem; }
        .hidden { display:none; }
        .footer { text-align:center; font-size:0.8rem; color:#a89888; margin-top:1rem; }
        #appHeader { text-align:center; margin-bottom:1rem; }
        #dayNumber { font-size:4rem; color:var(--sage-deep); }
        canvas { width:200px; height:240px; display:block; margin:1rem auto; }
        .diary-input { width:100%; padding:0.8rem; border-radius:16px; border:1px solid #e0d6cc; resize:vertical; margin:0.5rem 0; }
        .msg { font-size:0.9rem; color:var(--text-light); text-align:center; }
    </style>
</head>
<body>
<div class="container">
    <!-- 登录/注册界面 -->
    <div id="authPanel" class="card">
        <h1>🍀 Growing Together</h1>
        <input type="email" id="email" placeholder="邮箱地址">
        <input type="password" id="password" placeholder="密码">
        <button id="signInBtn">登录</button>
        <button class="alt-btn" id="signUpBtn">注册新账号</button>
        <p class="msg" id="authMsg"></p>
    </div>

    <!-- 主界面（登录后显示） -->
    <div id="appPanel" class="hidden">
        <div id="appHeader">
            <h1>🍀 <span id="nickDisplay">Growing Together</span></h1>
            <p class="msg" id="subDisplay">One leaf a day.</p>
        </div>
        <div class="card">
            <div id="dayNumber">—</div>
            <div class="msg">🍀 Day <span id="dayLabelNum">—</span></div>
            <div class="msg" style="font-size:0.8rem;">Growing since June 29, 2026</div>
        </div>
        <div class="card">
            <canvas id="cloverCanvas" width="500" height="600"></canvas>
            <p class="msg" id="stageName">🌱 等待第一片叶子</p>
            <button id="checkinBtn">🍀 Add Today's Leaf</button>
        </div>
        <div class="card" id="diaryCard">
            <textarea class="diary-input" id="diaryInput" placeholder="今天想对你说的话…" rows="3"></textarea>
            <button id="saveDiaryBtn">💌 保存日记</button>
        </div>
        <div class="card">
            <button id="logoutBtn" class="alt-btn">退出登录</button>
        </div>
        <div class="footer">Growing together, one leaf at a time. 🤍</div>
    </div>
</div>

<script>
    // ========== 配置 ==========
    const SUPABASE_URL = 'https://jljqqaooecepwvxcxkdy.supabase.co/rest/v1/';        // 替换为你的 Supabase URL
    const SUPABASE_ANON_KEY = 'sb_publishable_I1mdiXCaM3uySBQE53Xd9g_7zx3LVho'; // 替换为你的 anon key
    const START_DATE = new Date(2026, 5, 29);
    const BIRTHDAY_MONTH = 9;
    const BIRTHDAY_DAY = 9;

    // ========== 初始化 Supabase ==========
    const { createClient } = supabase;
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ========== 本地缓存（加速显示） ==========
    let localData = {
        checkin_dates: [],
        diary: {},
        specials: {},
        profile: { nickname: '', subtitle: 'One leaf a day.' },
        bg: 'default'
    };

    // ========== DOM 元素 ==========
    const authPanel = document.getElementById('authPanel');
    const appPanel = document.getElementById('appPanel');
    const authMsg = document.getElementById('authMsg');

    // ========== 认证逻辑 ==========
    async function signIn(email, password) {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        return data;
    }

    async function signUp(email, password) {
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) throw error;
        // 可能需要确认邮箱，但我们可以先提示
        if (data.user && data.user.identities.length === 0) {
            throw new Error('注册失败，可能邮箱已注册');
        }
        return data;
    }

    async function signOut() {
        await supabase.auth.signOut();
        appPanel.classList.add('hidden');
        authPanel.classList.remove('hidden');
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
    }

    // ========== 加载/保存云端数据 ==========
    async function loadCloudData() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return null;
        const { data, error } = await supabase
            .from('journal')
            .select('*')
            .eq('user_id', user.id)
            .single();
        if (error && error.code !== 'PGRST116') { // PGRST116 = no rows
            console.error(error);
            return null;
        }
        if (data) {
            localData = {
                checkin_dates: data.checkin_dates || [],
                diary: data.diary || {},
                specials: data.specials || {},
                profile: data.profile || { nickname: '', subtitle: 'One leaf a day.' },
                bg: data.bg || 'default'
            };
        } else {
            // 没有记录，创建一个
            await supabase.from('journal').insert([{ user_id: user.id }]);
        }
        return localData;
    }

    async function saveCloudData() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return;
        const { error } = await supabase
            .from('journal')
            .update({
                checkin_dates: localData.checkin_dates,
                diary: localData.diary,
                specials: localData.specials,
                profile: localData.profile,
                bg: localData.bg,
                updated_at: new Date()
            })
            .eq('user_id', user.id);
        if (error) console.error('Save error:', error);
    }

    // ========== 工具函数 ==========
    function getTodayStr() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function daysSinceStart() {
        const today = new Date(); today.setHours(0,0,0,0);
        const start = new Date(START_DATE); start.setHours(0,0,0,0);
        return Math.max(1, Math.floor((today - start)/86400000) + 1);
    }
    function hasCheckedInToday() { return localData.checkin_dates.includes(getTodayStr()); }

    // ========== 画布（简化版，保持三叶草生长） ==========
    const canvas = document.getElementById('cloverCanvas');
    const ctx = canvas.getContext('2d');
    const stageNames = ['🌱 等待第一片叶子','🌿 小嫩芽破土','🍀 第一片幸运叶','🍀 三叶草悄悄长大','🍀 四叶草！加倍幸运','🌿 新芽相伴','🌼 幸运草小花园','🌸 繁茂的草地','🌺 花园盛放'];
    function getGrowthStage(count) {
        if (count <= 0) return 0; if (count === 1) return 1; if (count <= 3) return 2;
        if (count <= 7) return 3; if (count <= 14) return 4; if (count <= 25) return 5;
        if (count <= 40) return 6; if (count <= 65) return 7; return 8;
    }
    function renderCanvas(checkinCount) {
        ctx.clearRect(0,0,500,600);
        const stage = getGrowthStage(checkinCount);
        // ... 绘制花盆和叶子（和之前一样，为简洁略去完整绘制代码，实际使用时需要保留）
        // 这里用简化版示意，真实代码请用之前完整的绘制逻辑
        ctx.fillStyle = '#c4956a';
        ctx.fillRect(200, 400, 100, 100); // 临时示意
        document.getElementById('stageName').textContent = stageNames[stage];
    }

    // ========== 更新界面 ==========
    function updateUI() {
        const totalDays = daysSinceStart();
        document.getElementById('dayNumber').textContent = totalDays;
        document.getElementById('dayLabelNum').textContent = totalDays;
        const profile = localData.profile;
        document.getElementById('nickDisplay').textContent = profile.nickname || 'Growing Together';
        document.getElementById('subDisplay').textContent = profile.subtitle || 'One leaf a day.';
        
        const btn = document.getElementById('checkinBtn');
        if (hasCheckedInToday()) {
            btn.disabled = true;
            btn.textContent = '✓ Today\'s Leaf Added';
        } else {
            btn.disabled = false;
            btn.textContent = '🍀 Add Today\'s Leaf';
        }
        const diary = localData.diary[getTodayStr()] || '';
        document.getElementById('diaryInput').value = diary;
        renderCanvas(localData.checkin_dates.length);
    }

    // ========== 签到 ==========
    async function doCheckin() {
        if (hasCheckedInToday()) return;
        localData.checkin_dates.push(getTodayStr());
        await saveCloudData();
        updateUI();
    }

    // ========== 日记保存 ==========
    document.getElementById('saveDiaryBtn').addEventListener('click', async () => {
        localData.diary[getTodayStr()] = document.getElementById('diaryInput').value;
        await saveCloudData();
        alert('日记已保存 💌');
    });

    // ========== 事件绑定 ==========
    document.getElementById('signInBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) return authMsg.textContent = '请输入邮箱和密码';
        try {
            await signIn(email, password);
            authPanel.classList.add('hidden');
            appPanel.classList.remove('hidden');
            await loadCloudData();
            updateUI();
        } catch (e) { authMsg.textContent = e.message; }
    });

    document.getElementById('signUpBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) return authMsg.textContent = '请输入邮箱和密码';
        try {
            await signUp(email, password);
            authMsg.textContent = '注册成功！如需验证邮箱，请检查收件箱。已自动登录。';
            // 某些情况下注册后直接登录
            await supabase.auth.signInWithPassword({ email, password });
            authPanel.classList.add('hidden');
            appPanel.classList.remove('hidden');
            await loadCloudData();
            updateUI();
        } catch (e) { authMsg.textContent = e.message; }
    });

    document.getElementById('checkinBtn').addEventListener('click', doCheckin);
    document.getElementById('logoutBtn').addEventListener('click', signOut);

    // 检查是否已登录
    supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
            authPanel.classList.add('hidden');
            appPanel.classList.remove('hidden');
            loadCloudData().then(updateUI);
        } else {
            appPanel.classList.add('hidden');
            authPanel.classList.remove('hidden');
        }
    });

    // 初始化
    (async () => {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            authPanel.classList.add('hidden');
            appPanel.classList.remove('hidden');
            await loadCloudData();
            updateUI();
        }
    })();
</script>
</body>
</html>
