<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🍀 Growing Together — 陪伴日记</title>
    <!-- 加载 Supabase SDK（全局暴露 supabase 对象） -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #fefaf5;
            --card-bg: rgba(255, 255, 255, 0.88);
            --sage: #b5c9b0;
            --sage-deep: #7d9b76;
            --text: #5c4a3a;
            --text-light: #8b7b6b;
            --text-muted: #a89888;
            --radius-lg: 28px;
            --font-main: Georgia, 'Times New Roman', 'Apple SD Gothic Neo', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg); font-family: var(--font-main); color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 2rem 1rem;
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .container { width:100%; max-width:480px; }
        .card {
            background: var(--card-bg); backdrop-filter: blur(18px); border-radius: var(--radius-lg);
            padding: 1.8rem; box-shadow: 0 8px 32px rgba(120,100,80,0.08);
            margin-bottom: 1.5rem; border: 1px solid rgba(181,201,176,0.25);
            position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, #d5e4d1, #b5c9b0, #e8d5c4);
            border-radius: 4px 4px 0 0; opacity: 0.7;
        }
        h1 { color:var(--sage-deep); font-size:1.8rem; text-align:center; margin-bottom:1rem; }
        input, textarea { width:100%; padding:0.8rem; border-radius:16px; border:1px solid #ddd; margin-bottom:0.8rem; font-size:1rem; font-family:inherit; }
        button {
            width:100%; padding:0.9rem; background:var(--sage-deep); color:#fff;
            border:none; border-radius:50px; font-size:1rem; cursor:pointer; margin-top:0.5rem;
            transition: 0.2s; box-shadow: 0 3px 12px rgba(125,155,118,0.2);
        }
        button.alt { background:transparent; color:var(--sage-deep); border:1.5px solid var(--sage-deep); box-shadow:none; }
        button:disabled { background:#c4d4c0; cursor:not-allowed; box-shadow:none; }
        .msg { font-size:0.9rem; color:var(--text-light); text-align:center; margin:0.5rem 0; }
        .hidden { display:none !important; }
        .footer { text-align:center; font-size:0.8rem; color:var(--text-muted); margin-top:1.5rem; }
        .day-number { font-size:4.5rem; font-weight:400; color:var(--sage-deep); text-align:center; line-height:1; }
        canvas { display:block; margin:0 auto; width:250px; height:300px; border-radius:20px; }
        @keyframes bounce {
            0%{transform:scale(1);} 30%{transform:scale(1.05);} 55%{transform:scale(0.96);} 75%{transform:scale(1.02);} 100%{transform:scale(1);}
        }
        .mini-calendar { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; font-size:0.75rem; margin-top:0.8rem; }
        .mini-calendar .cell { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:50%; background:rgba(255,250,245,0.6); }
        .mini-calendar .cell.checked { background:#d5e4d1; color:#4a6742; font-weight:bold; }
        .mini-calendar .cell.today { border:2px solid var(--sage-deep); }
    </style>
</head>
<body>
<div class="container">
    <!-- 登录/注册 -->
    <div id="authPanel" class="card">
        <h1>🍀 Growing Together</h1>
        <input type="email" id="email" placeholder="邮箱地址" autocomplete="email">
        <input type="password" id="password" placeholder="密码" autocomplete="current-password">
        <button id="signInBtn">登录</button>
        <button class="alt" id="signUpBtn">注册新账号</button>
        <p class="msg" id="authMsg"></p>
    </div>

    <!-- 主应用 -->
    <div id="appPanel" class="hidden">
        <div style="text-align:center; margin-bottom:1rem;">
            <h1>🍀 <span id="nickDisplay">Growing Together</span></h1>
            <p class="msg" id="subDisplay">One leaf a day.</p>
        </div>
        <div class="card">
            <div class="day-number" id="dayNumber">—</div>
            <div class="msg">🍀 Day <span id="dayLabelNum">—</span></div>
            <div style="font-size:0.8rem; color:var(--text-muted);">Growing since June 29, 2026</div>
        </div>
        <div class="card">
            <canvas id="cloverCanvas" width="500" height="600"></canvas>
            <p class="msg" id="stageName">🌱 等待第一片叶子</p>
            <button id="checkinBtn">🍀 Add Today's Leaf</button>
            <div class="mini-calendar" id="miniCalendar"></div>
        </div>
        <div class="card">
            <textarea id="diaryInput" placeholder="今天想对你说的话…" rows="3"></textarea>
            <button id="saveDiaryBtn">💌 保存日记</button>
        </div>
        <button class="alt" id="logoutBtn">退出登录</button>
        <div class="footer">Growing together, one leaf at a time. 🤍</div>
    </div>
</div>

<script>
    // ========== 1. 替换为你的 Supabase 信息 ==========
    const SUPABASE_URL = 'https://jljqqaooecepwvxcxkdy.supabase.co';       // ← 替换这里
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsanFxYW9vZWNlcHd2eGN4a2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MTk5NzMsImV4cCI6MjA5ODQ5NTk3M30.8IygRIdcfGKva5Fzo0TuEizkkuFgtN1T2eM9avBcioc'; // ← 替换这里

    // ========== 2. 初始化 Supabase 客户端（不要重复声明 supabase） ==========
    console.log('🔄 正在连接 Supabase...');
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log('✅ Supabase 客户端已创建', db);

    // 本地数据缓存
    const local = {
        checkin_dates: [],
        diary: {},
        specials: {},
        profile: { nickname: '', subtitle: 'One leaf a day.' },
        bg: 'default'
    };

    const START_DATE = new Date(2026, 5, 29);

    // ========== DOM 元素 ==========
    const authPanel = document.getElementById('authPanel');
    const appPanel = document.getElementById('appPanel');
    const authMsg = document.getElementById('authMsg');
    const signInBtn = document.getElementById('signInBtn');
    const signUpBtn = document.getElementById('signUpBtn');
    const canvas = document.getElementById('cloverCanvas');
    const ctx = canvas.getContext('2d');

    // ========== 认证函数 ==========
    async function signIn(email, password) {
        signInBtn.disabled = true;
        signInBtn.textContent = '登录中...';
        try {
            const { error } = await db.auth.signInWithPassword({ email, password });
            if (error) throw error;
        } finally {
            signInBtn.disabled = false;
            signInBtn.textContent = '登录';
        }
    }

    async function signUp(email, password) {
        signUpBtn.disabled = true;
        signUpBtn.textContent = '注册中...';
        try {
            const { error } = await db.auth.signUp({ email, password });
            if (error) throw error;
        } finally {
            signUpBtn.disabled = false;
            signUpBtn.textContent = '注册新账号';
        }
    }

    // ========== 云端数据操作 ==========
    async function loadCloudData() {
        const { data: { user }, error: userError } = await db.auth.getUser();
        if (userError || !user) {
            console.warn('未登录');
            return null;
        }
        console.log('当前用户 ID:', user.id);
        const { data, error } = await db.from('journal').select('*').eq('user_id', user.id).maybeSingle();
        if (error) {
            console.error('加载数据出错', error);
            return null;
        }
        if (data) {
            local.checkin_dates = data.checkin_dates || [];
            local.diary = data.diary || {};
            local.specials = data.specials || {};
            local.profile = data.profile || { nickname: '', subtitle: 'One leaf a day.' };
            local.bg = data.bg || 'default';
            console.log('✅ 云端数据已加载', local);
        } else {
            // 首次创建记录
            console.log('创建新用户记录');
            await db.from('journal').insert([{ user_id: user.id }]);
        }
        return local;
    }

    async function saveCloudData() {
        const { data: { user } } = await db.auth.getUser();
        if (!user) return;
        const { error } = await db.from('journal').update({
            checkin_dates: local.checkin_dates,
            diary: local.diary,
            specials: local.specials,
            profile: local.profile,
            bg: local.bg,
            updated_at: new Date()
        }).eq('user_id', user.id);
        if (error) console.error('保存失败', error);
        else console.log('💾 数据已保存');
    }

    // ========== 工具 ==========
    function getTodayStr() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function daysSinceStart() {
        const today = new Date(); today.setHours(0,0,0,0);
        const start = new Date(START_DATE); start.setHours(0,0,0,0);
        return Math.max(1, Math.floor((today - start)/86400000) + 1);
    }
    function hasCheckedInToday() { return local.checkin_dates.includes(getTodayStr()); }

    // ========== 画布 ==========
    const stageNames = ['🌱 等待第一片叶子','🌿 小嫩芽破土','🍀 第一片幸运叶','🍀 三叶草悄悄长大','🍀 四叶草！加倍幸运','🌿 新芽相伴','🌼 幸运草小花园','🌸 繁茂的草地','🌺 花园盛放'];
    function getGrowthStage(count) {
        if (count<=0) return 0; if (count===1) return 1; if (count<=3) return 2;
        if (count<=7) return 3; if (count<=14) return 4; if (count<=25) return 5;
        if (count<=40) return 6; if (count<=65) return 7; return 8;
    }
    function drawLeaf(x,y,s,r){
        ctx.save(); ctx.translate(x,y); ctx.rotate(r);
        ctx.fillStyle='#7d9b76'; ctx.beginPath();
        for(let t=0;t<=Math.PI*2;t+=0.1){
            let sx=16*Math.pow(Math.sin(t),3)*s;
            let sy=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*s;
            if(t===0)ctx.moveTo(sx,sy); else ctx.lineTo(sx,sy);
        }
        ctx.fill(); ctx.restore();
    }
    function renderCanvas(count) {
        ctx.clearRect(0,0,500,600);
        const stage=getGrowthStage(count);
        const cx=250;
        // 花盆
        ctx.fillStyle='#c4956a';
        ctx.beginPath(); ctx.moveTo(165,395); ctx.lineTo(335,395); ctx.lineTo(310,500); ctx.lineTo(190,500); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#d4a574'; ctx.fillRect(155,393,190,12);
        // 土壤
        ctx.fillStyle='#8b6f5e'; ctx.beginPath(); ctx.ellipse(250,403,80,12,0,0,Math.PI*2); ctx.fill();
        if(stage===0){ ctx.fillStyle='#baa89a'; ctx.beginPath(); ctx.arc(250,398,5,0,Math.PI*2); ctx.fill(); }
        else if(stage===1){ ctx.strokeStyle='#8db580'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(250,400); ctx.lineTo(250,370); ctx.stroke(); ctx.fillStyle='#a8c9a0'; ctx.beginPath(); ctx.ellipse(243,372,7,4,-0.5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(257,372,7,4,0.5,0,Math.PI*2); ctx.fill(); }
        else if(stage===2){ ctx.strokeStyle='#8db580'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(250,400); ctx.lineTo(250,340); ctx.stroke(); drawLeaf(250,340,0.6,0); }
        else if(stage===3){ ctx.strokeStyle='#8db580'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(250,400); ctx.lineTo(250,310); ctx.stroke(); for(let i=0;i<3;i++)drawLeaf(250,305,0.65,i*Math.PI*2/3); ctx.fillStyle='#6a8a63'; ctx.beginPath(); ctx.arc(250,305,6,0,Math.PI*2); ctx.fill(); }
        else if(stage===4){ ctx.strokeStyle='#8db580'; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(250,400); ctx.lineTo(250,295); ctx.stroke(); for(let i=0;i<4;i++)drawLeaf(250,290,0.7,i*Math.PI/2+Math.PI/8); ctx.fillStyle='#6a8a63'; ctx.beginPath(); ctx.arc(250,290,6,0,Math.PI*2); ctx.fill(); }
        else if(stage>=5){ ctx.strokeStyle='#8db580'; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(250,400); ctx.lineTo(250,280); ctx.stroke(); for(let i=0;i<4;i++)drawLeaf(250,275,0.75,i*Math.PI/2+Math.PI/8); ctx.fillStyle='#6a8a63'; ctx.beginPath(); ctx.arc(250,275,6,0,Math.PI*2); ctx.fill(); if(stage>=6){ ctx.strokeStyle='#9cc090'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(230,390); ctx.lineTo(210,360); ctx.stroke(); drawLeaf(210,358,0.45,Math.PI/3); } if(stage>=7){ ctx.strokeStyle='#a0c495'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(270,390); ctx.lineTo(290,350); ctx.stroke(); drawLeaf(290,348,0.5,-Math.PI/4); } }
        document.getElementById('stageName').textContent = stageNames[stage];
    }

    function renderMiniCalendar() {
        const now = new Date();
        const year=now.getFullYear(), month=now.getMonth();
        const daysInMonth = new Date(year,month+1,0).getDate();
        const firstDay = new Date(year,month,1).getDay();
        let html='';
        for(let i=0;i<firstDay;i++) html+='<div></div>';
        for(let d=1; d<=daysInMonth; d++){
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            html += `<div class="cell${local.checkin_dates.includes(dateStr)?' checked':''}${d===now.getDate()?' today':''}">${d}</div>`;
        }
        document.getElementById('miniCalendar').innerHTML = html;
    }

    async function updateUI() {
        const total = daysSinceStart();
        const count = local.checkin_dates.length;
        document.getElementById('dayNumber').textContent = total;
        document.getElementById('dayLabelNum').textContent = total;
        document.getElementById('nickDisplay').textContent = local.profile.nickname || 'Growing Together';
        document.getElementById('subDisplay').textContent = local.profile.subtitle || 'One leaf a day.';
        const btn = document.getElementById('checkinBtn');
        if (hasCheckedInToday()) {
            btn.disabled = true;
            btn.innerHTML = '✓ Today\'s Leaf Added<br><small>See you tomorrow.</small>';
        } else {
            btn.disabled = false;
            btn.innerHTML = '🍀 Add Today\'s Leaf';
        }
        document.getElementById('diaryInput').value = local.diary[getTodayStr()] || '';
        renderCanvas(count);
        renderMiniCalendar();
    }

    // ========== 签到 ==========
    async function doCheckin() {
        if (hasCheckedInToday()) return;
        local.checkin_dates.push(getTodayStr());
        await saveCloudData();
        // 弹跳动画
        canvas.style.animation = 'none';
        canvas.offsetHeight;
        canvas.style.animation = 'bounce 0.7s ease';
        await updateUI();
    }

    // ========== 事件绑定 ==========
    signInBtn.addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const pw = document.getElementById('password').value;
        if (!email || !pw) {
            authMsg.textContent = '请输入邮箱和密码';
            return;
        }
        try {
            await signIn(email, pw);
            console.log('登录成功');
            authPanel.classList.add('hidden');
            appPanel.classList.remove('hidden');
            await loadCloudData();
            await updateUI();
        } catch (e) {
            authMsg.textContent = e.message;
            console.error('登录失败', e);
        }
    });

    signUpBtn.addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const pw = document.getElementById('password').value;
        if (!email || !pw) {
            authMsg.textContent = '请输入邮箱和密码';
            return;
        }
        try {
            await signUp(email, pw);
            authMsg.textContent = '注册成功！请检查邮箱确认（或已自动登录）';
            console.log('注册成功');
        } catch (e) {
            authMsg.textContent = e.message;
            console.error('注册失败', e);
        }
    });

    document.getElementById('checkinBtn').addEventListener('click', doCheckin);
    document.getElementById('saveDiaryBtn').addEventListener('click', async () => {
        local.diary[getTodayStr()] = document.getElementById('diaryInput').value;
        await saveCloudData();
        alert('日记已保存 💌');
    });
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await db.auth.signOut();
        appPanel.classList.add('hidden');
        authPanel.classList.remove('hidden');
    });

    // 监听登录状态变化
    db.auth.onAuthStateChange(async (event, session) => {
        console.log('认证状态变化', event);
        if (session) {
            authPanel.classList.add('hidden');
            appPanel.classList.remove('hidden');
            await loadCloudData();
            await updateUI();
        } else {
            appPanel.classList.add('hidden');
            authPanel.classList.remove('hidden');
        }
    });

    // 初始检查
    (async () => {
        const { data: { session } } = await db.auth.getSession();
        if (session) {
            authPanel.classList.add('hidden');
            appPanel.classList.remove('hidden');
            await loadCloudData();
            await updateUI();
        }
    })();
</script>
</body>
</html>
